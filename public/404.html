<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ON Coaching</title>
  <script>
    // GitHub Pages SPA redirect — works for both subdirectory (github.io/repo) and custom domain (root)
    var l = window.location;
    var segs = l.pathname.split('/').filter(function(s){ return s !== ''; });
    var isGitHubIo = l.hostname.endsWith('.github.io');
    var basePath = (isGitHubIo && segs.length >= 1) ? '/' + segs[0] : '';
    var subPath  = isGitHubIo ? '/' + segs.slice(1).join('/') : '/' + segs.join('/');
    l.replace(
      l.protocol + '//' + l.host + basePath + '/?p=' + encodeURIComponent(subPath) +
      (l.search ? '&' + l.search.slice(1) : '') + l.hash
    );
  </script>
</head>
</html>
