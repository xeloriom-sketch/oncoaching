<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ON Coaching</title>
  <script>
    // GitHub Pages SPA redirect — preserves path for React Router
    var l = window.location;
    var base = '/oncoaching';
    var path = l.pathname.replace(base, '') || '/';
    l.replace(l.protocol + '//' + l.host + base + '/?p=' + encodeURIComponent(path) + (l.search ? '&' + l.search.slice(1) : '') + l.hash);
  </script>
</head>
</html>
